hilt = "2.59.2"
composeBom = "2026.03.01"


############### Koltin Version ###########
coroutines = "1.10.2"
serialization = "1.10.0"



########## Test Version ############
junit = "4.13.2"
androidx-junit = "1.3.0"
espresso-core = "3.7.0"
material = "1.13.0"
activityVersion = "1.12.4"
runner = "1.0.2"








[libraries]

###### activity #####
androidx-activity-ktx = { group = "androidx.activity", name = "activity-ktx",version.ref = "activity"}
androidx-fragment-ktx = { group = "androidx.fragment", name = "fragment-ktx", version.ref = "fragment"}

######### AndroidX##############
androidx-appcompat = { group = "androidx.appcompat", name = "appcompat", version.ref = "appcompat"}
################## android 工具类 #######
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "core-ktx" }
androidx-annotation = { group = "androidx.annotation", name = "annotation", version.ref = "annotation" }
androidx-graphics-core = { group = "androidx.graphics",name = "graphics-core", version.ref = "graphics-core" }
androidx-tracing = { module = "androidx.tracing:tracing-ktx", version.ref = "tracing" }

androidx-gridlayout = { module = "androidx.gridlayout:gridlayout",version.ref = "gridlayout"}

######################### View ####################################
androidx-constraintlayout = { group = "androidx.constraintlayout", name = "constraintlayout", version = "2.2.1"}



############## lifecycle   生命周期感知 #######
androidx-lifecycle-process = {group = "androidx.lifecycle",name ="lifecycle-process",version.ref = "lifecycle"}
androidx-lifecycle-livedata = { group = "androidx.lifecycle", name = "lifecycle-livedata", version.ref = "lifecycle"}
androidx-lifecycle-runtime = { group = "androidx.lifecycle", name = "lifecycle-runtime", version.ref = "lifecycle"}
androidx-lifecycle-runtime-ktx= { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx",version.ref = "lifecycle"}
androidx-lifecycle-viewmodel-ktx = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-ktx",version.ref = "lifecycle"}
androidx-lifecycle-viewmodel-android = { group = "androidx.lifecycle",name = "lifecycle-viewmodel-android",version.ref = "lifecycle"}
androidx-lifecycle-service= { group = "androidx.lifecycle", name = "lifecycle-service", version.ref = "lifecycle"}

androidx-work-runtime = { group = "androidx.work", name = "work-runtime", version.ref = "work" }

########## Datastore Key- value 数据存储 ###############
datastore-android = { group = "androidx.datastore", name = "datastore", version.ref = "datastore" }
datastore-core = { group = "androidx.datastore", name = "datastore-core", version.ref = "datastore" }
datastore-preferences = { group = "androidx.datastore", name = "datastore-preferences", version.ref = "datastore"}

################# 二维码 ##############
zxing-core = { group = "com.google.zxing", name = "core", version.ref = "zxing"}
xlog = { module = "com.elvishew:xlog", version.ref = "xlog" }
################ retrofit #########################
retrofit-core = { group = "com.squareup.retrofit2", name = "retrofit", version.ref = "retrofit" }
retrofit-kotlin-serialization = { group = "com.squareup.retrofit2", name = "converter-kotlinx-serialization", version.ref = "retrofit" }

################### okhttp ##################
okhttp = { group = "com.squareup.okhttp3",name ="okhttp", version.ref = "okhttp3"}
okhttp-coroutines= { group = "com.squareup.okhttp3", name ="okhttp-coroutines",version.ref = "okhttp3"}
okhttp-logging-interceptor = { group = "com.squareup.okhttp3",name ="logging-interceptor",version.ref = "okhttp3"}
okhttp-sse = { group = "com.squareup.okhttp3", name ="okhttp-sse",version.ref = "okhttp3"}


androidx-media3-exoplayer = { module = "androidx.media3:media3-exoplayer", version.ref = "media3" }
androidx-media3-ui = { module = "androidx.media3:media3-ui", version.ref = "media3" }


############### MQTT ##################
mqtt-client = { module = "org.eclipse.paho:org.eclipse.paho.client.mqttv3" ,version.ref = "mqttv3"}


############## kotlin 协程 ####################
coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "coroutines" }

kotlin-stdlib = { module = "org.jetbrains.kotlin:kotlin-stdlib", version.ref = "kotlin" }
################## 序列化 #################
serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "serialization" }


junit = { group = "junit", name = "junit", version.ref = "junit" }
androidx-junit = { group = "androidx.test.ext", name = "junit", version.ref = "androidx-junit" }
androidx-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "espresso-core" }
runner = { group = "com.android.support.test", name = "runner", version.ref = "runner" }


# Gradle Plugins
android-gradlePlugin = { group = "com.android.tools.build", name = "gradle", version.ref = "agp" }
