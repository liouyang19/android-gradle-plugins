licensee = "1.12.0"
kotlin-ksp = "2.2.0-2.0.2"
kotlin = "2.3.10"
##################### AndroidX Libraray Version ###########
appcompat = "1.7.1"
activity = "1.12.4"
fragment = "1.8.9"
core-ktx = "1.17.0"
graphics-core = "1.0.4"

annotation = "1.9.1"

datastore = "1.2.0"
lifecycle = "2.10.0"

tracing = "1.3.0"

#############第三方库#################
retrofit = "3.0.0"
work = "2.11.1"
